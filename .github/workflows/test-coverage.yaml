name: test-coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # cmdstanr (a non-CRAN Suggests) is fetched from GitHub via DESCRIPTION's
      # Remotes field, which pak reads. Do NOT add the stan-dev r-universe to the
      # repo pool: pak would then pull its DEV StanHeaders/rstan, which fail to
      # compile against CRAN's RcppEigen. cmdstanr is pure R (no Stan headers of
      # its own), so Remotes pins only cmdstanr and the Stan stack stays on CRAN.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2, any::pkgload, any::roxygen2, any::roxyglobals
          needs: coverage

      # NAMESPACE and R/globals.R are untracked, regenerated by roxygen2 (#115).
      # The package needs a NAMESPACE -- useDynLib(imuGAP) registers the Stan
      # modules -- to load_all() (fit_data.R below) and for covr's install later.
      # Regenerate NAMESPACE from source now that the deps (including roxygen2)
      # are installed: source-mode roxygen needs the package's declared
      # dependencies present, but not the package itself or the Stan toolchain.
      # Yields the same NAMESPACE the full roxygenise produces later.
      - name: Bootstrap NAMESPACE
        run: roxygen2::roxygenise(roclets = "namespace", load_code = "source")
        shell: Rscript {0}

      - name: Cache Stan compilation objects
        uses: actions/cache@v5
        with:
          path: src/
          key: ${{ runner.os }}-rrelease-stan-${{ hashFiles('inst/stan/**/*.stan', 'src/**/*.stan') }}
          restore-keys: |
            ${{ runner.os }}-rrelease-stan-

      # predict_sim (and the other fitted artifacts) are gitignored and
      # regenerated on build (#64); test-predict.R loads predict_sim, so it must
      # exist before covr installs the package and runs the tests.
      - name: Generate fitted data artifacts
        timeout-minutes: 45
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: Rscript data-raw/fit_data.R

      # NAMESPACE and R/globals.R are gitignored and regenerated by roxygen2
      # (#115), so the checkout ships neither; covr installs the package, which
      # needs a NAMESPACE. Regenerate it (roxygenise() bootstraps a missing one)
      # after the fitted data exists. Mirrors R-CMD-check.yaml / pkgdown.yaml.
      - name: Generate documentation
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Run tests with coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: cobertura.xml

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package

  coverage:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-data

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || ! github.event.pull_request.head.repo.fork }}
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
