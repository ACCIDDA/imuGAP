# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # NAMESPACE and R/globals.R are untracked, regenerated by roxygen2 (#115).
      # The package needs a NAMESPACE -- useDynLib(imuGAP) registers the Stan
      # modules -- to install or load_all(), and the install below (local::.)
      # happens before the main roxygenise step. Regenerate NAMESPACE from source
      # here: this needs only roxygen2 (no Stan toolchain, no package data) and
      # yields the same file the full roxygenise produces later.
      - name: Bootstrap NAMESPACE
        run: |
          install.packages("roxygen2")
          roxygen2::roxygenise(roclets = "namespace", load_code = "source")
        shell: Rscript {0}

      # cmdstanr (a non-CRAN Suggests) is fetched from GitHub via DESCRIPTION's
      # Remotes field, which pak reads. Do NOT add the stan-dev r-universe to the
      # repo pool: pak would then pull its DEV StanHeaders/rstan, which fail to
      # compile against CRAN's RcppEigen. cmdstanr is pure R (no Stan headers of
      # its own), so Remotes pins only cmdstanr and the Stan stack stays on CRAN.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::roxygen2, any::roxyglobals, any::pkgload, local::.
          needs: website

      - name: Cache Stan compilation objects
        uses: actions/cache@v5
        with:
          path: src/
          key: ${{ runner.os }}-stan-pkgdown-${{ hashFiles('inst/stan/**/*.stan', 'src/**/*.stan') }}
          restore-keys: |
            ${{ runner.os }}-stan-pkgdown-
            ${{ runner.os }}-stan-

      # Regenerate the gitignored fitted-data artifacts (#64): the site's
      # reference examples and vignette use them, and the documented datasets
      # must be present for the build. Mirrors R-CMD-check.yaml.
      - name: Generate fitted data artifacts
        timeout-minutes: 45
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: Rscript data-raw/fit_data.R

      # PKG_BUILD_EXTRA_FLAGS=false stops pkgbuild from injecting its
      # debug flags (-g -O0) when pkgload::load_all() recompiles the
      # package under roxygen2. See R-CMD-check.yaml for full context.
      - name: Generate documentation
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      # install = TRUE so the package is (re)installed AFTER the fitted data are
      # regenerated above -- otherwise the vignette renders against the
      # setup-time local::. install, which predates the regenerated data and
      # fails with "object 'fit_sim' not found" (#64).
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
