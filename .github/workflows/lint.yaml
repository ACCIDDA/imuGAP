name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # lint_package() is static: it needs the sources and deps, not an installed
      # imuGAP or a regenerated NAMESPACE, so every build step in the composite
      # action is toggled off here (bootstrap/cache/data/docs).
      - name: Setup imuGAP CI environment
        uses: ./.github/actions/setup-imugap
        with:
          extra-packages: any::lintr
          needs: lint
          bootstrap-namespace: 'false'
          cache-stan: 'false'
          generate-data: 'false'
          generate-docs: 'false'

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
