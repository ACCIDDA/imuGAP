name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # cmdstanr (a non-CRAN Suggests) is fetched from GitHub via DESCRIPTION's
      # Remotes field, which pak reads. Do NOT add the stan-dev r-universe to the
      # repo pool: pak would then pull its DEV StanHeaders/rstan, which fail to
      # compile against CRAN's RcppEigen. cmdstanr is pure R (no Stan headers of
      # its own), so Remotes pins only cmdstanr and the Stan stack stays on CRAN.
      #
      # local::. is intentionally NOT installed: NAMESPACE is untracked (#115),
      # so imuGAP can't be installed until roxygen2 regenerates it. lint_package()
      # is static -- it needs the sources and deps, not an installed imuGAP or a
      # NAMESPACE -- so this job skips the "Bootstrap NAMESPACE" step the
      # build/check jobs use.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
