name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # cmdstanr (a Suggests) is not on CRAN; install it from GitHub. Do NOT add
      # the stan-dev r-universe to the repo pool: pak would then pull its DEV
      # StanHeaders/rstan, which fail to compile against CRAN's RcppEigen. cmdstanr
      # is pure R (no Stan headers of its own), so the GitHub install stays
      # isolated and the rest of the Stan stack resolves from CRAN.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::., stan-dev/cmdstanr
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
