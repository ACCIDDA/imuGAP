name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # NAMESPACE and R/globals.R are untracked, regenerated by roxygen2 (#115).
      # The package needs a NAMESPACE -- useDynLib(imuGAP) registers the Stan
      # modules -- to install or load_all(), and the install below (local::.)
      # happens before the main roxygenise step. Regenerate NAMESPACE from source
      # here: this needs only roxygen2 (no Stan toolchain, no package data) and
      # yields the same file the full roxygenise produces later.
      - name: Bootstrap NAMESPACE
        run: |
          install.packages("roxygen2")
          roxygen2::roxygenise(roclets = "namespace", load_code = "source")
        shell: Rscript {0}

      # cmdstanr (a non-CRAN Suggests) is fetched from GitHub via DESCRIPTION's
      # Remotes field, which pak reads. Do NOT add the stan-dev r-universe to the
      # repo pool: pak would then pull its DEV StanHeaders/rstan, which fail to
      # compile against CRAN's RcppEigen. cmdstanr is pure R (no Stan headers of
      # its own), so Remotes pins only cmdstanr and the Stan stack stays on CRAN.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
