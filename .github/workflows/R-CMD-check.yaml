name: R-CMD-check

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    # Set up standard environment variables for R package checking
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # 3. Install the package's dependencies (looks at your DESCRIPTION file)
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # 4. Run the standard R package check
      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"' # Fails the pipeline only if there are hard errors