name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: macos-latest,   r: 'release'}
          - {os: macos-latest,   r: 'oldrel'}
          - {os: macos-latest,   r: 'devel'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'oldrel'}
          - {os: windows-latest, r: 'devel'}

    continue-on-error: ${{ matrix.config.r == 'devel' }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gettext
          GETTEXT_PREFIX="$(brew --prefix gettext)"
          mkdir -p ~/.R
          echo "CPPFLAGS += -I${GETTEXT_PREFIX}/include" >> ~/.R/Makevars
          echo "LDFLAGS += -L${GETTEXT_PREFIX}/lib" >> ~/.R/Makevars

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # cmdstanr (a non-CRAN Suggests) is fetched from GitHub via DESCRIPTION's
      # Remotes field, which pak reads. Do NOT add the stan-dev r-universe to the
      # repo pool: pak would then pull its DEV StanHeaders/rstan, which fail to
      # compile against CRAN's RcppEigen. cmdstanr is pure R (no Stan headers of
      # its own), so Remotes pins only cmdstanr and the Stan stack stays on CRAN.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2, any::roxyglobals, any::pkgload
          needs: check

      # NAMESPACE and R/globals.R are untracked, regenerated by roxygen2 (#115).
      # The package needs a NAMESPACE -- useDynLib(imuGAP) registers the Stan
      # modules -- to load_all(), which the "Generate fitted data artifacts" step
      # below does before the main roxygenise step. Regenerate NAMESPACE from
      # source now that the deps (including roxygen2) are installed: source-mode
      # roxygen needs the package's declared dependencies present, but not the
      # package itself or the Stan toolchain. Same file the full roxygenise makes.
      - name: Bootstrap NAMESPACE
        run: roxygen2::roxygenise(roclets = "namespace", load_code = "source")
        shell: Rscript {0}

      - name: Cache Stan compilation objects
        uses: actions/cache@v5
        with:
          path: src/
          key: ${{ runner.os }}-r${{ matrix.config.r }}-stan-${{ hashFiles('inst/stan/**/*.stan', 'src/**/*.stan') }}
          restore-keys: |
            ${{ runner.os }}-r${{ matrix.config.r }}-stan-

      # fit_sim/target_sim/predict_sim/latent_params_sim are gitignored and
      # regenerated on build by Part B of the data pipeline (#64). R CMD check,
      # the vignette, and the examples need them present, so build them here.
      # fit_data.R's load_all() compiles the package, so the roxygenise() step
      # and the check reuse that build. PKG_BUILD_EXTRA_FLAGS=false matches it.
      - name: Generate fitted data artifacts
        timeout-minutes: 45
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: Rscript data-raw/fit_data.R

      # PKG_BUILD_EXTRA_FLAGS=false stops pkgbuild from injecting its
      # debug flags (-g -O0) when pkgload::load_all() recompiles the
      # package under roxygen2. -O0 inflates Stan template object files
      # past the Windows COFF section limit even with -Wa,-mbig-obj.
      # See pkgbuild docs: ?pkgbuild::compile_dll.
      - name: Generate documentation
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'

  check-result:
    if: always()
    needs: [R-CMD-check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        run: |
          if [ "${{ needs.R-CMD-check.result }}" = "failure" ]; then
            echo "One or more required checks failed"
            exit 1
          fi
