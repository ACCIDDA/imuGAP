name: CRAN submission

on:
  release:
    types: [prereleased]
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "CONFIRM" to submit manually (skip via release: prereleased otherwise)'
        required: true
        default: ''

permissions:
  contents: read
  issues: write   # so the action can create a tracking issue with submission status

jobs:
  news-version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Warn if NEWS.md is missing the version heading
        run: |
          if [ ! -f NEWS.md ]; then
            echo "::warning::NEWS.md not found at repo root. CRAN convention is to ship one."
            exit 0
          fi
          VERSION=$(grep -E '^Version:' DESCRIPTION | sed -E 's/Version:[[:space:]]*//')
          if grep -qE "^# imuGAP[[:space:]]+$VERSION([[:space:]]|$)" NEWS.md; then
            echo "NEWS.md heading found for version $VERSION."
          else
            echo "::warning::NEWS.md has no '# imuGAP $VERSION' heading. Add one before the release lands on CRAN."
          fi

  submit:
    needs: news-version-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # cmdstanr (a Suggests) is not on CRAN; install it from GitHub. Do NOT add
      # the stan-dev r-universe to the repo pool: pak would then pull its DEV
      # StanHeaders/rstan, which fail to compile against CRAN's RcppEigen. cmdstanr
      # is pure R (no Stan headers of its own), so the GitHub install stays
      # isolated and the rest of the Stan stack resolves from CRAN.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2, any::roxyglobals, any::pkgload, stan-dev/cmdstanr
          needs: check

      # fit_sim/target_sim/predict_sim/latent_params_sim are gitignored and
      # regenerated on build (#64). This MUST run before roxygenise(): the data
      # are documented (the "fit_sim" string form), so roxygen2 reads the objects
      # to build their .Rd and errors if they are absent. The submission tarball
      # also needs them present.
      - name: Generate fitted data artifacts
        timeout-minutes: 45
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: Rscript data-raw/fit_data.R

      # man/*.Rd is gitignored and regenerated by roxygen2 in CI (#53), so the
      # checkout ships no .Rd files. Regenerate them before the submission build,
      # or R CMD check --as-cran flags every object as undocumented. Mirrors the
      # "Generate documentation" step in R-CMD-check.yaml.
      - name: Generate documentation
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - uses: coatless-actions/cran-submission@v1
        with:
          error-on: 'warning'
          confirmation: ${{ github.event.inputs.confirmation }}
