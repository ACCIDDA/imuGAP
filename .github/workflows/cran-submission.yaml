name: CRAN submission

on:
  release:
    types: [prereleased]
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "CONFIRM" to submit manually (skip via release: prereleased otherwise)'
        required: true
        default: ''

permissions:
  contents: read
  issues: write   # so the action can create a tracking issue with submission status

jobs:
  news-version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Warn if NEWS.md is missing the version heading
        run: |
          if [ ! -f NEWS.md ]; then
            echo "::warning::NEWS.md not found at repo root. CRAN convention is to ship one."
            exit 0
          fi
          VERSION=$(grep -E '^Version:' DESCRIPTION | sed -E 's/Version:[[:space:]]*//')
          if grep -qE "^# imuGAP[[:space:]]+$VERSION([[:space:]]|$)" NEWS.md; then
            echo "NEWS.md heading found for version $VERSION."
          else
            echo "::warning::NEWS.md has no '# imuGAP $VERSION' heading. Add one before the release lands on CRAN."
          fi

  submit:
    needs: news-version-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
          extra-repositories: https://stan-dev.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Pin the Stan stack to CRAN (the r-universe added for cmdstanr also
          # serves dev rstan/StanHeaders/bayesplot; dev StanHeaders breaks stanc).
          extra-packages: >-
            any::rcmdcheck, any::roxygen2, any::roxyglobals,
            cran::rstan, cran::StanHeaders, cran::bayesplot
          needs: check

      # man/*.Rd is gitignored and regenerated by roxygen2 in CI (#53), so the
      # checkout ships no .Rd files. Regenerate them before the submission build,
      # or R CMD check --as-cran flags every object as undocumented. Mirrors the
      # "Generate documentation" step in R-CMD-check.yaml.
      - name: Generate documentation
        env:
          PKG_BUILD_EXTRA_FLAGS: "false"
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - uses: coatless-actions/cran-submission@v1
        with:
          error-on: 'warning'
          confirmation: ${{ github.event.inputs.confirmation }}
