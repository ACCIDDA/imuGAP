name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reprex
    attributes:
      label: Minimal reproducible example
      description: Paste a short R script that reproduces the problem. Wrap in a code fence.
      render: r
    validations:
      required: false

  - type: textarea
    id: session_info
    attributes:
      label: Session info
      description: Paste the output of `sessionInfo()`.
      render: text
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Ubuntu / Linux
        - Windows
        - Other
    validations:
      required: true
