name: 'Setup imuGAP CI environment'
description: >
  Shared setup for imuGAP's CI jobs. Installs R and the package's dependencies
  and, optionally, performs the NAMESPACE bootstrap, Stan compile cache, fitted
  data regeneration, and roxygen documentation that the build / check / site /
  coverage / submission jobs all need. Centralizes the sequence (and the single
  cmdstanr caution) that was otherwise copy-pasted across the workflows.

inputs:
  r-version:
    description: 'R version to install (passed to setup-r).'
    required: false
    default: 'release'
  extra-packages:
    description: 'Extra packages for r-lib/actions/setup-r-dependencies.'
    required: true
  needs:
    description: 'Config/Needs profile(s) for r-lib/actions/setup-r-dependencies.'
    required: true
  bootstrap-namespace:
    description: 'Regenerate NAMESPACE from source before building.'
    required: false
    default: 'true'
  cache-stan:
    description: 'Cache compiled Stan objects in src/.'
    required: false
    default: 'true'
  generate-data:
    description: 'Regenerate the gitignored fitted-data artifacts via data-raw/fit_data.R.'
    required: false
    default: 'true'
  generate-docs:
    description: 'Regenerate man/*.Rd via roxygen2::roxygenise().'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install macOS system dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install gettext
        GETTEXT_PREFIX="$(brew --prefix gettext)"
        mkdir -p ~/.R
        echo "CPPFLAGS += -I${GETTEXT_PREFIX}/include" >> ~/.R/Makevars
        echo "LDFLAGS += -L${GETTEXT_PREFIX}/lib" >> ~/.R/Makevars

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ inputs.r-version }}
        use-public-rspm: true

    # cmdstanr (a non-CRAN Suggests) is fetched from GitHub via DESCRIPTION's
    # Remotes field, which pak reads. Do NOT add the stan-dev r-universe to the
    # repo pool: pak would then pull its DEV StanHeaders/rstan, which fail to
    # compile against CRAN's RcppEigen. cmdstanr is pure R (no Stan headers of
    # its own), so Remotes pins only cmdstanr and the Stan stack stays on CRAN.
    - name: Install dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: ${{ inputs.extra-packages }}
        needs: ${{ inputs.needs }}

    # NAMESPACE and R/globals.R are untracked, regenerated by roxygen2 (#115).
    # The package needs a NAMESPACE -- useDynLib(imuGAP) registers the Stan
    # modules -- to load_all() and to build/install. Regenerate NAMESPACE from
    # source now that the deps (including roxygen2) are installed: source-mode
    # roxygen needs the package's declared dependencies present, but not the
    # package itself or the Stan toolchain. Same file the full roxygenise makes.
    - name: Bootstrap NAMESPACE
      if: inputs.bootstrap-namespace == 'true'
      shell: Rscript {0}
      run: roxygen2::roxygenise(roclets = "namespace", load_code = "source")

    - name: Cache Stan compilation objects
      if: inputs.cache-stan == 'true'
      uses: actions/cache@v5
      with:
        path: src/
        key: ${{ runner.os }}-r${{ inputs.r-version }}-stan-${{ hashFiles('inst/stan/**/*.stan', 'src/**/*.stan') }}
        restore-keys: |
          ${{ runner.os }}-r${{ inputs.r-version }}-stan-

    # fit_sim/target_sim/predict_sim/latent_params_sim are gitignored and
    # regenerated on build (#64). R CMD check, the vignette, the examples, and
    # the tests need them present, so build them here. fit_data.R's load_all()
    # compiles the package, so the roxygenise() step below and the downstream
    # check/build reuse that build. PKG_BUILD_EXTRA_FLAGS=false matches it.
    #
    # NB: composite-action steps do not support `timeout-minutes`, so the 45-min
    # cap the standalone workflows placed on this step now falls back to the job
    # default. Add a job-level `timeout-minutes` in the caller to re-bound it.
    - name: Generate fitted data artifacts
      if: inputs.generate-data == 'true'
      shell: bash
      env:
        PKG_BUILD_EXTRA_FLAGS: "false"
      run: Rscript data-raw/fit_data.R

    # PKG_BUILD_EXTRA_FLAGS=false stops pkgbuild from injecting its debug flags
    # (-g -O0) when pkgload::load_all() recompiles the package under roxygen2.
    # -O0 inflates Stan template object files past the Windows COFF section limit
    # even with -Wa,-mbig-obj. See ?pkgbuild::compile_dll.
    - name: Generate documentation
      if: inputs.generate-docs == 'true'
      shell: Rscript {0}
      env:
        PKG_BUILD_EXTRA_FLAGS: "false"
      run: roxygen2::roxygenise()
